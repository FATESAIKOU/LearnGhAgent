version: '3.8'

services:
  learn-tech:
    build:
      context: ../..
      dockerfile: workenv/learn-tech/Dockerfile
    volumes:
      - ../../auth/hosts.yml:/auth-src/hosts.yml:ro
    environment:
      - REPO
      - ISSUE_ID
      - BRANCH_NAME
      - COPILOT_MODEL
    command: ["${REPO}", "${ISSUE_ID}", "${BRANCH_NAME}"]
