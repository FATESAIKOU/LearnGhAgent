version: '3.8'

services:
  poc:
    build:
      context: ../..
      dockerfile: workenv/poc/Dockerfile
    volumes:
      - ../../auth/hosts.yml:/auth-src/hosts.yml:ro
    environment:
      - REPO
      - ISSUE_ID
      - BRANCH_NAME
      - COPILOT_MODEL
    command: ["${REPO}", "${ISSUE_ID}", "${BRANCH_NAME}"]
