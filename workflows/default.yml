technical-investigation:
  config:
    - repo: FATESAIKOU/SelfImprovement
      url: ""
      description: "Target repo for investigation output and PR"
  steps:
    - role: manager
      phasename: investigation-scope
      phase-prompt: "Analyze all given topics, define investigation boundaries, extract the user-provided evaluation viewpoints, and structure the report in a way that is easy for the user to understand."
      llm-model: "gpt-5-mini"
      phase-env: {}
      workspace-init:
        - clone-and-branch.sh
        - ban-git-write.sh
      workspace-cleanup:
        - unban-git-write.sh
        - push-and-pr.sh

    - role: architect
      phasename: evaluation-framework
      phase-prompt: "Build the investigation framework for all topics, including evaluation axes, comparison dimensions, assumptions, risks, trade-offs, and validation criteria based on the user's viewpoints."
      llm-model: "gpt-5-mini"
      phase-env: {}
      workspace-init:
        - clone-and-branch.sh
        - ban-git-write.sh
      workspace-cleanup:
        - unban-git-write.sh
        - push-and-pr.sh

    - role: coder
      phasename: evidence-validation
      phase-prompt: "Investigate and validate all given topics against the defined framework, examine supporting and opposing evidence, compare alternatives where relevant, and organize findings without implementing, committing, or pushing code."
      llm-model: "gpt-5-mini"
      phase-env: {}
      workspace-init:
        - clone-and-branch.sh
        - ban-git-write.sh
      workspace-cleanup:
        - unban-git-write.sh
        - push-and-pr.sh

    - role: qa
      phasename: report-consolidation
      phase-prompt: "Verify that every given topic has been examined from all required viewpoints, check logical consistency and coverage, and produce a structured final report in the user-specified format without pushing code changes."
      llm-model: "gpt-5-mini"
      phase-env: {}
      workspace-init:
        - clone-and-branch.sh
        - ban-git-write.sh
      workspace-cleanup:
        - unban-git-write.sh
        - push-and-pr.sh