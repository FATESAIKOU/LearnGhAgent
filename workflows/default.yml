# Default Workflow Definition
#
# Each workflow has two sections:
#   config  - list of repos to clone into /workspace (agent can work across all of them)
#   steps   - sequence of phases (role + phasename + phase-prompt + optional model)
#
# Issues are matched by labels: workflow:<name> + phase:<phasename>
# After each phase completes, the agent auto-transitions to the next step.
#
# Per-step fields:
#   role              - agent role (must match agents/<role>/ directory)
#   phasename         - unique phase identifier (used in phase:<phasename> label)
#   phase-prompt      - text injected into the agent prompt for this phase
#                       (supports {BRANCH_NAME}, {ISSUE_NUMBER} placeholders)
#   llm-model         - LLM model override (empty = use COPILOT_MODEL env var)
#   workspace-init    - scripts to run BEFORE agent execution (from workspace-scripts/)
#   workspace-cleanup - scripts to run AFTER agent execution (from workspace-scripts/)
#   phase-env         - extra environment variables passed to all hook scripts in this phase

full-development:
  config:
    - repo: FATESAIKOU/LearnGhAgent
      url: ""
      description: "The agent system itself"
  steps:
    - role: manager
      phasename: requirement-analysis
      phase-prompt: "Analyze the issue, clarify requirements, and produce a structured requirements document."
      llm-model: ""
      phase-env: {}
      workspace-init:
        - clone-and-branch.sh
        - ban-git-write.sh
      workspace-cleanup:
        - unban-git-write.sh
        - push-and-pr.sh

    - role: architect
      phasename: system-design
      phase-prompt: "Design the system architecture based on the requirements document."
      llm-model: ""
      phase-env: {}
      workspace-init:
        - clone-and-branch.sh
        - ban-git-write.sh
      workspace-cleanup:
        - unban-git-write.sh
        - push-and-pr.sh

    - role: coder
      phasename: implementation
      phase-prompt: "Implement the design, write code, and commit changes."
      llm-model: ""
      phase-env: {}
      workspace-init:
        - clone-and-branch.sh
        - ban-git-write.sh
      workspace-cleanup:
        - unban-git-write.sh
        - push-and-pr.sh

    - role: qa
      phasename: verification
      phase-prompt: "Verify the implementation against requirements and design."
      llm-model: ""
      phase-env: {}
      workspace-init:
        - clone-and-branch.sh
        - ban-git-write.sh
      workspace-cleanup:
        - unban-git-write.sh
        - push-and-pr.sh

