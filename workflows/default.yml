# Default Workflow Definition
# Each workflow defines a sequence of phases.
# Issues are matched by labels: workflow:<name> + phase:<phasename>
# After each phase completes, the agent auto-transitions to the next phase.
#
# Per-phase fields:
#   role         - agent role (must match agents/<role>/ directory)
#   phasename    - unique phase identifier (used in phase:<phasename> label)
#   phasetarget  - description of what this phase should accomplish
#   llm-model    - LLM model override (empty = use COPILOT_MODEL env var)
#   extra-flags  - extra flags passed to gh copilot CLI (empty = none)

full-development:
  - role: manager
    phasename: requirement-analysis
    phasetarget: "Analyze the issue, clarify requirements, and produce a structured requirements document."
    llm-model: ""
    extra-flags: ""

  - role: architect
    phasename: system-design
    phasetarget: "Design the system architecture based on the requirements document."
    llm-model: ""
    extra-flags: ""

  - role: coder
    phasename: implementation
    phasetarget: "Implement the design, write code, and commit changes."
    llm-model: ""
    extra-flags: ""

  - role: qa
    phasename: verification
    phasetarget: "Verify the implementation against requirements and design."
    llm-model: ""
    extra-flags: ""

quick-fix:
  - role: coder
    phasename: fix
    phasetarget: "Fix the bug or implement the small change described in the issue."
    llm-model: ""
    extra-flags: ""

  - role: qa
    phasename: verify-fix
    phasetarget: "Verify the fix is correct and does not introduce regressions."
    llm-model: ""
    extra-flags: ""
